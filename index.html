<script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: true });

    async function createPayment() {
        try {
            const payment = await Pi.createPayment({
                amount: 0.1,
                memo: "Test de validation DriveSafe",
                metadata: { orderId: 12345 },
            }, {
                onReadyForServerApproval: (paymentId) => { console.log("Prêt pour approbation"); },
                onReadyForServerCompletion: (paymentId, txid) => { console.log("Transaction finie"); },
                onCancel: (paymentId) => { console.log("Paiement annulé"); },
                onError: (error, payment) => { console.error("Erreur Pi", error); },
            });
        } catch (err) {
            alert("Erreur lors de l'ouverture du portefeuille Pi");
        }
    }

    document.getElementById('pay-button').onclick = createPayment;
</script>
