<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveSafe App - Validation Étape 10</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .container { text-align: center; padding: 30px; border-radius: 16px; background: white; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1); width: 320px; max-width: 90%; }
        .pi-btn { background-color: #6200ee; color: white; border: none; padding: 14px 28px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; box-shadow: 0 4px 12px rgba(98, 0, 238, 0.3); }
        .pi-btn:disabled { background-color: #aaaaaa; box-shadow: none; cursor: not-allowed; }
        .status-box { margin-top: 20px; padding: 10px; border-radius: 6px; font-size: 13px; }
        .info { background-color: #e8f0fe; color: #1a73e8; }
        .success { background-color: #e6f4ea; color: #137333; }
        .error { background-color: #fce8e6; color: #c5221f; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DriveSafe App</h1>
        <p>Validation Réelle Étape 10</p>
        <button class="pi-btn" id="pay-button" disabled>Connexion au SDK Pi...</button>
        <div class="status-box info" id="status-message">Initialisation...</div>
    </div>
    <script>
        const payButton = document.getElementById('pay-button');
        const statusDiv = document.getElementById('status-message');
        const BACKEND_URL = "https://drivesafe-x7gv.onrender.com"; 

        window.onload = function() {
            // On s'assure que l'objet Pi existe bien avant de lancer l'initialisation
            if (window.Pi) {
                try {
                    window.Pi.init({ version: "2.0", sandbox: true });
                    
                    window.Pi.authenticate(['username', 'payments'], function(incomplete) {
                        console.log("Paiement incomplet :", incomplete);
                    })
                    .then(function(auth) {
                        statusDiv.className = "status-box success";
                        statusDiv.innerHTML = "Connecté : <strong>" + auth.user.username + "</strong>";
                        payButton.disabled = false;
                        payButton.innerText = "Payer 1 Pi (Test)";
                    })
                    .catch(function(err) {
                        statusDiv.className = "status-box error";
                        statusDiv.innerText = "Erreur d'authentification : " + err.message;
                    });
                } catch (e) {
                    statusDiv.className = "status-box error";
                    statusDiv.innerText = "Erreur init : " + e.message;
                }
            } else {
                statusDiv.className = "status-box error";
                statusDiv.innerText = "Le script Pi n'est pas chargé par le navigateur.";
            }
        };

        payButton.addEventListener('click', function() {
            statusDiv.className = "status-box info";
            statusDiv.innerText = "Création du paiement en cours...";
            payButton.disabled = true;

            window.Pi.createPayment({
                amount: 1,
                memo: "Validation de l'étape 10 - DriveSafe",
                metadata: { internal_id: "test-etape-10" }
            }, {
                onReadyForServerApproval: function(paymentId) {
                    statusDiv.innerText = "Approbation par le serveur...";
                    fetch(`${BACKEND_URL}/approve`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: paymentId })
                    })
                    .then(res => res.json())
                    .then(data => {
                        window.Pi.approvePayment(paymentId);
                        statusDiv.innerText = "Paiement approuvé. En attente sur ton Wallet...";
                    })
                    .catch(err => {
                        statusDiv.className = "status-box error";
                        statusDiv.innerText = "Erreur d'approbation serveur.";
                        payButton.disabled = false;
                    });
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    statusDiv.innerText = "Finalisation sur la Blockchain...";
                    fetch(`${BACKEND_URL}/complete`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: paymentId, txid: txid })
                    })
                    .then(res => res.json())
                    .then(data => {
                        window.Pi.completePayment(paymentId, txid);
                        statusDiv.className = "status-box success";
                        statusDiv.innerText = "Félicitations ! Étape 10 validée !";
                    })
                    .catch(err => {
                        statusDiv.className = "status-box error";
                        statusDiv.innerText = "Erreur de finalisation.";
                        payButton.disabled = false;
                    });
                },
                onCancel: function(paymentId) {
                    statusDiv.className = "status-box info";
                    statusDiv.innerText = "Paiement annulé.";
                    payButton.disabled = false;
                },
                onError: function(error, payment) {
                    statusDiv.className = "status-box error";
                    statusDiv.innerText = "Erreur Pi : " + error.message;
                    payButton.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
