<script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: true });

    async function testPayment() {
        try {
            const payment = await Pi.createPayment({
                amount: 0.1,
                memo: "Validation DriveSafe",
                metadata: { orderId: "test-101" },
            }, {
                onReadyForServerApproval: (id) => { console.log("Approve"); },
                onReadyForServerCompletion: (id, tx) => { console.log("Complete"); },
                onCancel: (id) => { console.log("Cancel"); },
                onError: (err, p) => { console.error("Error", err); },
            });
        } catch (err) {
            console.log("Tentative d'ouverture...");
        }
    }

    document.getElementById('pay-button').addEventListener('click', testPayment);
</script>
