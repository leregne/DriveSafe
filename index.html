<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveSafe App</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            padding: 30px;
            border-radius: 16px;
            background: white;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            max-width: 90%;
            width: 320px;
        }
        .pi-btn {
            background-color: #6200ee;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 12px rgba(98, 0, 238, 0.3);
        }
        .pi-btn:disabled {
            background-color: #aaaaaa;
            box-shadow: none;
            cursor: not-allowed;
        }
        .status-box {
            margin-top: 20px;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
        }
        .info { background-color: #e8f0fe; color: #1a73e8; }
        .success { background-color: #e6f4ea; color: #137333; }
        .error { background-color: #fce8e6; color: #c5221f; }
    </style>
</head>
<body>

    <div class="container">
        <h1>DriveSafe App</h1>
        <p>Validation Sandbox sécurisée</p>
        <button class="pi-btn" id="pay-button" disabled>Attente du SDK Pi...</button>
        <div class="status-box info" id="status-message">Connexion au réseau...</div>
    </div>

    <script>
        const payButton = document.getElementById('pay-button');
        const statusDiv = document.getElementById('status-message');
        const BACKEND_URL = "https://drivesafe-e7gv.onrender.com";

        window.onload = function() {
            try {
                window.Pi.init({ version: "2.0", sandbox: true });
                
                setTimeout(function() {
                    window.Pi.authenticate(['username', 'payments'], function(incomplete) {})
                    .then(function(auth) {
                        statusDiv.className = "status-box success";
                        statusDiv.innerHTML = "Connecté : <strong>" + auth.user.username + "</strong>";
                        payButton.disabled = false;
                        payButton.innerText = "Payer 1 Pi";
                    })
                    .catch(function(err) {
                        statusDiv.className = "status-box error";
                        statusDiv.innerText = "Erreur d'authentification : " + err.message;
                    });
                }, 1500);
            } catch (e) {
                statusDiv.className = "status-box error";
                statusDiv.innerText = "Erreur SDK : " + e.message;
            }
        };

        payButton.addEventListener('click', function() {
            payButton.disabled = true;
            payButton.innerText = "Traitement...";

            window.Pi.createPayment({
                amount: 1,
                memo: "Test Sandbox DriveSafe",
                metadata: { orderId: "DS-2026" }
            }, {
                onReadyForServerApproval: function(paymentId) {
                    statusDiv.innerText = "Approbation serveur...";
                    fetch(`${BACKEND_URL}/approve-payment`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: paymentId })
                    })
                    .then(res => res.json())
                    .then(() => {
                        statusDiv.innerText = "Approuvé ! Signature requise...";
                    });
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    statusDiv.innerText = "Finalisation de la transaction...";
                    fetch(`${BACKEND_URL}/complete-payment`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: paymentId, txid: txid })
                    })
                    .then(res => res.json())
                    .then(() => {
                        statusDiv.className = "status-box success";
                        statusDiv.innerHTML = "<strong>Paiement Réussi !</strong>";
                        payButton.disabled = false;
                        payButton.innerText = "Payer 1 Pi";
                    });
                },
                onCancel: function(paymentId) {
                    payButton.disabled = false;
                    payButton.innerText = "Payer 1 Pi";
                    statusDiv.innerText = "Annulé.";
                },
                onError: function(error, paymentId) {
                    payButton.disabled = false;
                    payButton.innerText = "Payer 1 Pi";
                    statusDiv.className = "status-box error";
                    statusDiv.innerText = "Erreur : " + error.message;
                }
            });
        });
    </script>
</body>
</html>
